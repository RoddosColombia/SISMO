services:
  - type: web
    name: sismo-backend
    env: python
    region: oregon
    plan: free
    root_dir: backend
    build_command: "pip install -r requirements.txt"
    start_command: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
